    <meta charset="UTF-8">

    <title>Página Inicial</title>
    <style>
        /* Remove margens padrão e faz o corpo ocupar toda a tela */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center;     /* Centraliza verticalmente */
            background-color: #ffffff; /* Cor de fundo (opcional) */
            overflow: hidden;        /* Evita barras de rolagem se a imagem couber */
        }

        img {
            max-width: 90%;          /* A imagem não ultrapassa a largura da tela */
            max-height: 90%;         /* A imagem não ultrapassa a altura da tela */
            height: auto;            /* Mantém a proporção original */
            display: block;
        }
    </style>
</head>
